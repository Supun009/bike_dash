<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Dash v2.0</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="connectBtn">CONNECT BIKE</button>
    <div id="gpsStatus">GPS: Searching...</div>

    <div class="dashboard-container">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="range-info">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.77,7.23,19.34,6.8a.5.5,0,0,1,0-.71l.71-.71a.5.5,0,0,1,.71,0l.43.43a2,2,0,0,1,0,2.83,2,2,0,0,1-2.83,0A2,2,0,0,1,19.77,7.23ZM18,10a1,1,0,1,1,1-1A1,1,0,0,1,18,10ZM12,18H6V6h6Zm1-13H5A1,1,0,0,0,4,6V18a1,1,0,0,0,1,1h8a1,1,0,0,0,1-1V6A1,1,0,0,0,13,5Zm6,9a3,3,0,1,1,3-3A3,3,0,0,1,19,14Z"
            ></path>
          </svg>
          <span class="range-val" id="fuelRange">122</span>
          <span class="range-unit">mi</span>
        </div>
        <div class="mode-info">ROAD</div>
      </div>

      <!-- Main Content -->
      <div class="main-display">
        <!-- Left: Speed -->
        <div class="speed-section">
          <div class="speed-val" id="speed">0</div>
          <div class="speed-unit">km/h</div>
        </div>

        <!-- Center: RPM SVG -->
        <div class="rpm-gauge-container">
          <svg class="rpm-svg" viewBox="0 0 800 400">
            <path id="rpm-path-bg" d="M100 350 Q 250 350, 400 200 T 700 80" />
            <path id="rpm-path-fill" d="M100 350 Q 250 350, 400 200 T 700 80" />
            <path
              id="rpm-path-redline"
              d="M100 350 Q 250 350, 400 200 T 700 80"
            />
            <g class="rpm-marks">
              <text x="70" y="340">0</text>
              <text x="180" y="330">2</text>
              <text x="280" y="280">4</text>
              <text x="380" y="210">6</text>
              <text x="480" y="150">8</text>
              <text x="560" y="110">10</text>
              <text x="640" y="80">12</text>
              <text x="710" y="70">14</text>
            </g>
          </svg>
          <div class="rpm-label-bottom">RPM x 1000</div>
        </div>

        <!-- Right: Gear and Stats -->
        <div class="right-section">
          <div id="fanWarning" class="fan-warning hidden">FAN ON</div>
          <div class="stats-card">
            <div class="stat-row">
              <div class="stat-label">TEMP</div>
              <div class="stat-value">
                <span id="temp">0.0</span><span class="stat-unit">°C</span>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat-label">BATT</div>
              <div class="stat-value">
                <span id="volt">0.0</span><span class="stat-unit">V</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom: Time -->
      <div class="footer-bar">
        <div class="time-val" id="time">12:58 PM</div>
      </div>
    </div>

    <!-- Modular JS -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
